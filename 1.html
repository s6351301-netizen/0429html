<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>語意化標籤範例</title>
</head>
<body>

    <!-- 頁首：放置 Logo 或導覽選單 -->
    <header>
        <h1>我的網站標題</h1>
        <nav>
            <ul>
                <li><a href="#home">首頁</a></li>
                <li><a href="#about">關於我們</a></li>
            </ul>
        </nav>
    </header>

    <!-- 主要內容區 -->
    <main>
        <!-- 獨立的文章內容 -->
        <article>
            <h2>HTML5 語意化的重要性</h2>
            <p>使用語意標籤能讓搜尋引擎（SEO）更了解網頁結構。</p>
            
            <!-- 文章內的具體章節 -->
            <section>
                <h3>1. 提升可讀性</h3>
                <p>開發者能快速辨識區塊功能。</p>
            </section>
        </article>

        <!-- 側邊欄：補充資訊 -->
        <aside>
            <h3>熱門文章</h3>
            <ul>
                <li>學習 CSS 的 5 個技巧</li>
            </ul>
        </aside>
    </main>

    <!-- 頁尾：版權宣告與聯絡資訊 -->
    <footer>
        <p>&copy; 2024 網頁開發教學</p>
    </footer>

</body>
</html>
