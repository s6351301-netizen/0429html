<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 龍蝦代理革命 - OpenClaw 專題網頁</title>
    <style>
        :root { --lobster-red: #E63946; --ocean-blue: #1D3557; --sand: #F1FAEE; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sand); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* 導覽列 */
        nav { background: var(--ocean-blue); padding: 1rem; position: sticky; top: 0; z-index: 1000; }
        nav ul { list-style: none; display: flex; justify-content: center; gap: 20px; margin: 0; }
        nav a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        nav a:hover { color: var(--lobster-red); }

        /* 內容區塊 */
        .content { flex: 1; padding: 40px; max-width: 900px; margin: 0 auto; display: none; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 元素樣式 */
        .lobster-img { width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin: 20px 0; }
        h1 { color: var(--lobster-red); border-left: 5px solid var(--ocean-blue); padding-left: 15px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin: 10px 0; border-bottom: 4px solid var(--lobster-red); }
        footer { text-align: center; padding: 20px; background: #eee; font-size: 0.8rem; }
    </style>
</head>
<body>
<img src="./05.jpg" class="lobster-img" alt="龍蝦代理的封面圖">
    <h1 style="text-align: center; color: var(--ocean-blue);">AI 龍蝦代理革命</h1>
    <p style="text-align: center; font-size: 1.2rem; color: var(--ocean-blue);">從 LLM 到 Agentic AI 的未來趨勢與挑戰</p>
<nav>
    <ul>
        <li><a onclick="showPage('home')">首頁：龍蝦降臨</a></li>
        <li><a onclick="showPage('tech')">核心技術</a></li>
        <li><a onclick="showPage('apply')">應用場景</a></li>
        <li><a onclick="showPage('risk')">風險警示</a></li>
        <li><a onclick="showPage('future')">未來展望</a></li>
    </ul>
</nav>
